<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=680">
<title>Potassium</title>
<style>
:root{--bg:#0d0d14;--panel:#141420;--accent:#c9a050;--purple:#7b5ea7;--text:#e0dfe6;--dim:#666680;--meter-lo:#4ecdc4;--meter-hi:#e94560;--meter-rms:#3da5d9;--gr:#d4845a;--white:#f0edf5;--arc:#2a2a3a;--bar:#1a1a28}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;width:680px;height:380px;overflow:hidden;user-select:none;position:relative;transform-origin:0 0;transform:scale(1.324);border:1px solid #2a2a3a;border-radius:4px}
/* ARC */
svg.arc{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
/* INPUT METER */
.in-wrap{position:absolute;left:24px;top:18px;display:flex;flex-direction:column;align-items:center}
.in-meter{width:16px;height:152px;background:var(--panel);border-radius:8px;overflow:hidden;position:relative}
.in-fill{position:absolute;bottom:0;width:100%;border-radius:8px;background:linear-gradient(0deg,var(--meter-lo),var(--meter-hi));height:0;transition:height .1s}
.in-num{font-size:11px;font-weight:600;color:var(--white);margin-bottom:2px;width:42px;text-align:center}
.in-pk{font-size:11px;font-weight:600;color:var(--white);margin-bottom:6px;width:42px;text-align:center}
.sweet-box{position:absolute;left:5px;right:5px;border:1px solid var(--accent);border-radius:3px;opacity:0;transition:opacity .3s}
.sweet-box.on{opacity:1}
.sweet-label{font-size:7px;color:var(--accent);margin-top:4px;letter-spacing:1px;opacity:0;transition:opacity .3s}
.sweet-label.on{opacity:1}
/* OUTPUT METER */
.out-wrap{position:absolute;right:108px;top:18px;display:flex;flex-direction:column;align-items:center}
.out-meter{width:16px;height:152px;background:var(--panel);border-radius:8px;overflow:hidden;position:relative}
.out-fill{position:absolute;bottom:0;width:100%;border-radius:8px;background:linear-gradient(0deg,var(--meter-lo),var(--meter-hi));height:0;transition:height .1s}
.out-num{font-size:11px;font-weight:600;color:var(--white);margin-bottom:2px;width:42px;text-align:center}
.out-pk{font-size:11px;font-weight:600;color:var(--white);margin-bottom:6px;width:42px;text-align:center}
/* EQ */
.eq-label{position:absolute;left:148px;top:120px;font-size:12px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.eq-wrap{position:absolute;left:58px;top:42px;display:flex;flex-direction:column;gap:12px}
.eq-row{display:flex;align-items:center;gap:8px}
.eq-name{font-size:11px;color:var(--dim);width:44px;text-align:right;text-transform:uppercase;letter-spacing:1px}
.eq-track{width:96px;height:7px;background:var(--panel);border-radius:3px;cursor:pointer}
.eq-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:3px;width:0;transition:width .05s}
.eq-db{font-size:10px;color:var(--dim);width:30px}
/* PUSH */
.push-wrap{position:absolute;left:226px;top:20px;width:230px;height:230px;display:flex;align-items:center;justify-content:center}
.push-ring{position:absolute;width:196px;height:196px;border-radius:50%;border:3px solid var(--arc)}
.push-knob{width:148px;height:148px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#1e1e30,var(--bg));border:2px solid var(--accent);box-shadow:0 0 30px rgba(201,160,80,.12),inset 0 0 40px rgba(0,0,0,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;z-index:3}
.push-val{font-size:38px;font-weight:200;color:var(--accent);line-height:1}
.push-pct{font-size:14px;color:var(--accent);opacity:.7;margin-top:-2px}
.push-name{font-size:10px;color:var(--dim);margin-top:6px;letter-spacing:4px;text-transform:uppercase}
/* GR */
.gr-wrap{position:absolute;left:448px;top:32px;display:flex;gap:14px}
.gr-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.gr-name{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.gr-track{width:12px;height:80px;background:var(--panel);border-radius:6px;overflow:hidden;position:relative}
.gr-fill{position:absolute;top:0;width:100%;background:var(--gr);border-radius:6px;height:0;transition:height .15s}
.gr-val{font-size:10px;color:var(--gr);font-weight:600}
/* BOTTOM KNOBS */
.bottom{position:absolute;left:100px;bottom:38px;display:flex;gap:70px;align-items:center}
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.knob-ring{width:54px;height:54px;border-radius:50%;background:var(--panel);border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s}
.knob-ring:hover{border-color:var(--accent)}
.knob-inner{width:38px;height:38px;border-radius:50%;background:var(--bg);position:relative}
.knob-dot{position:absolute;width:3px;height:14px;background:var(--accent);border-radius:2px;bottom:50%;left:50%;margin-left:-1.5px;transform-origin:bottom center}
.knob-v{font-size:12px;color:var(--white);font-weight:500}
.knob-n{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
/* BYPASS */
.bp-wrap{position:absolute;right:16px;top:22px;display:flex;flex-direction:column;gap:2px}
.bp-btn{font-size:9px;color:var(--dim);padding:3px 10px;border:1px solid transparent;border-radius:4px;cursor:pointer;text-align:center;transition:all .15s;text-transform:uppercase;letter-spacing:1px}
.bp-btn:hover{border-color:var(--dim);color:var(--text)}
.bp-btn.on{color:var(--accent);border-color:var(--accent);background:rgba(201,160,80,.08)}
.bp-btn.bp-master{margin-top:6px;border-color:var(--dim)}
.bp-btn.bp-master.on{color:var(--white);border-color:var(--accent);background:var(--accent);font-weight:600}
/* BRAND */
.brand{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:13px;color:var(--dim);letter-spacing:6px;text-transform:uppercase}
.brand span{color:var(--accent);font-size:15px}
.ver{position:absolute;bottom:10px;left:14px;font-size:8px;color:var(--dim);letter-spacing:1px}
.elem{position:absolute;right:12px;bottom:8px;font-size:10px;color:var(--dim);letter-spacing:1px}
.elem b{color:var(--accent);font-size:14px}
/* Periodic table card - bottom right */
.pt-card{position:absolute;right:66px;bottom:30px;width:88px;height:112px;
  border:2px solid var(--accent);border-radius:8px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(201,160,80,.04)}
.pt-num{font-size:12px;color:var(--dim);letter-spacing:1px}
.pt-sym{font-size:40px;color:var(--accent);font-weight:200;line-height:1}
.pt-name{font-size:7px;color:var(--dim);letter-spacing:2px;margin-top:2px}
.pt-el{font-size:8px;color:var(--dim);margin-top:2px}
.pt-weight{font-size:9px;color:var(--dim)}
.pt-flame{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:52px;height:14px;background:linear-gradient(0deg,var(--purple),transparent);border-radius:50%;opacity:.25}
/* OS selector */
.os-wrap{position:absolute;right:16px;bottom:120px;display:flex;flex-direction:column;gap:2px}
.os-btn{font-size:8px;color:var(--dim);padding:2px 8px;border:1px solid transparent;border-radius:3px;cursor:pointer;text-align:center;transition:all .15s;letter-spacing:1px}
.os-btn:hover{border-color:var(--dim);color:var(--text)}
.os-btn.on{color:var(--accent);border-color:var(--accent);background:rgba(201,160,80,.08)}
.os-label{font-size:7px;color:var(--dim);text-align:center;letter-spacing:2px;margin-bottom:2px}
.scale-wrap{position:absolute;right:190px;bottom:30px;display:flex;flex-direction:column;gap:2px}
.scale-btn{font-size:8px;color:var(--dim);padding:2px 8px;border:1px solid transparent;border-radius:3px;cursor:pointer;text-align:center;transition:all .15s;letter-spacing:1px}
.scale-btn:hover{border-color:var(--dim);color:var(--text)}
.scale-btn.on{color:var(--accent);border-color:var(--accent);background:rgba(201,160,80,.08)}
.undo-wrap{position:absolute;right:190px;bottom:130px;display:flex;flex-direction:column;gap:4px;border:1px solid var(--arc);border-radius:4px;padding:6px 4px 4px 4px}
.undo-btn{font-size:8px;color:var(--dim);padding:2px 8px;border:1px solid transparent;border-radius:3px;cursor:pointer;text-align:center;transition:all .15s;letter-spacing:1px}
.undo-btn:hover{border-color:var(--dim);color:var(--text)}
</style>
</head>
<body>

<svg class="arc" viewBox="0 0 680 380"><path d="M10,210 Q340,70 670,210" fill="none" stroke="#2a2a3a" stroke-width="1.5"/><circle cx="340" cy="137" r="3" fill="#3a3a4a"/></svg>

<div class="in-wrap">
  <div class="in-num" id="inNumRMS">-60.0</div>
  <div class="in-pk" id="inNumPk">-60.0</div>
  <div class="in-meter" style="position:relative"><div class="in-fill" id="inFill"></div><div class="sweet-box" id="sweetBox" style="top:25px;height:25px"></div></div>
  <div class="sweet-label" id="sweetLbl">SWEET</div>
</div>

<div class="out-wrap">
  <div class="out-num" id="outNumRMS">-60.0</div>
  <div class="out-pk" id="outNumPk">-60.0</div>
  <div class="out-meter"><div class="out-fill" id="outFill"></div></div>
</div>

<div class="eq-label">EQ</div>
<div class="eq-wrap">
  <div class="eq-row"><span class="eq-name">Dark</span><div class="eq-track" id="darkT"><div class="eq-fill" id="darkF"></div></div><span class="eq-db" id="darkV">0.0</span></div>
  <div class="eq-row"><span class="eq-name">Bright</span><div class="eq-track" id="brightT"><div class="eq-fill" id="brightF"></div></div><span class="eq-db" id="brightVal">0.0</span></div>
  <div class="eq-row"><span class="eq-name">Air</span><div class="eq-track" id="airT"><div class="eq-fill" id="airF"></div></div><span class="eq-db" id="airVal">0.0</span></div>
</div>

<div class="push-wrap">
  <div class="push-ring"></div>
  <div class="push-knob" id="pushKnob"><div class="push-val" id="pushVal">100</div><div class="push-pct">%</div><div class="push-name">Push</div></div>
</div>

<div class="gr-wrap">
  <div class="gr-col"><span class="gr-name">Comp</span><div class="gr-track"><div class="gr-fill" id="compGF"></div></div><span class="gr-val" id="compGV">0.0</span></div>
  <div class="gr-col"><span class="gr-name">Limit</span><div class="gr-track"><div class="gr-fill" id="limGF"></div></div><span class="gr-val" id="limGV">0.0</span></div>
</div>

<div class="bottom">
  <div class="knob-wrap"><div class="knob-ring" id="inKnobR"><div class="knob-inner"><div class="knob-dot" id="inDot"></div></div></div><div class="knob-v" id="inKV">0.0</div><div class="knob-n">Input</div></div>
  <div class="knob-wrap"><div class="knob-ring" id="limKnobR"><div class="knob-inner"><div class="knob-dot" id="limDot"></div></div></div><div class="knob-v" id="limKV">3.0</div><div class="knob-n">Limit</div></div>
  <div class="knob-wrap"><div class="knob-ring" id="outKnobR"><div class="knob-inner"><div class="knob-dot" id="outDot"></div></div></div><div class="knob-v" id="outKV">0.0</div><div class="knob-n">Output</div></div>
</div>

<div class="bp-wrap">
  <div class="bp-btn" data-bp="comp">Byp Comp</div>
  <div class="bp-btn" data-bp="drive">Byp Drive</div>
  <div class="bp-btn" data-bp="eq">Byp EQ</div>
  <div class="bp-btn" data-bp="stereo">Byp Stereo</div>
  <div class="bp-btn" data-bp="limit">Byp Limit</div>
  <div class="bp-btn bp-master" data-bp="all">Bypass</div>
</div>

<div class="brand">Ium <span>K</span> Audio</div>
<div class="ver">v1.0.5</div>
<div class="elem">19 <b>K</b> 39.098</div>
<div class="os-wrap"><div class="os-label">OVER</div><div class="os-btn on" data-os="Off">Off</div><div class="os-btn" data-os="2x">2x</div><div class="os-btn" data-os="4x">4x</div><div class="os-btn" data-os="8x">8x</div></div>
<div class="scale-wrap"><div class="os-label">ZOOM</div><div class="scale-btn" data-scale="0.993">75</div><div class="scale-btn on" data-scale="1.324">100</div><div class="scale-btn" data-scale="1.655">125</div><div class="scale-btn" data-scale="2.648">200</div></div>
<div class="undo-wrap"><div class="os-label">EDIT</div><div class="undo-btn" id="undoBtn">UNDO</div><div class="undo-btn" id="redoBtn">REDO</div></div>

<div class="pt-card"><div class="pt-num">19</div><div class="pt-sym">K</div><div class="pt-name">POTASSIUM</div><div class="pt-el">Alkali Metal</div><div class="pt-weight">39.098</div><div class="pt-flame"></div></div>

<script>
(function(){
var S={push:100,inputGain:0,limitGain:3,outGain:0,dark:0,bright:0,air:0,inPeak:-60,inSlow:-60,inFast:-60,outPeak:-60,sweet:false,compGR:0,limGR:0,overMode:'4x',zoom:1.324,bp:{comp:false,drive:false,eq:false,stereo:false,limit:false,all:false},_dragging:false,_dragParam:'',_undoC:0,_redoC:0};
var smooth={inPeak:-60,outPeak:-60,compGR:0,limGR:0};
var dragTarget=null,dragStartY=0,dragStartX=0,dragVal=0;

function lerp(a,b,t){return a+(b-a)*t;}
function render(){
  // body zoom (persisted across save/load)
  document.body.style.transform='scale('+S.zoom+')';
  // smooth
  var s=0.12;
  smooth.inPeak=lerp(smooth.inPeak,S.inPeak,s);
  smooth.outPeak=lerp(smooth.outPeak,S.outPeak,s);
  smooth.compGR=lerp(smooth.compGR,S.compGR,s);
  smooth.limGR=lerp(smooth.limGR,S.limGR,s);
  var inH=Math.max(0,Math.min(100,(smooth.inPeak+60)/60*100));
  var outH=Math.max(0,Math.min(100,(smooth.outPeak+60)/60*100));

  document.getElementById('inFill').style.height=inH+'%';
  document.getElementById('inNumRMS').textContent=(S.inSlow||S.inPeak).toFixed(1);
  document.getElementById('inNumPk').textContent=(S.inFast||S.inPeak).toFixed(1);
  document.getElementById('outFill').style.height=outH+'%';
  document.getElementById('outNumRMS').textContent=S.outPeak.toFixed(1);
  document.getElementById('outNumPk').textContent=S.outPeak.toFixed(1);

  if(S.sweet){document.getElementById('sweetBox').classList.add('on');document.getElementById('sweetLbl').classList.add('on')}
  else{document.getElementById('sweetBox').classList.remove('on');document.getElementById('sweetLbl').classList.remove('on')}

  document.getElementById('darkF').style.width=(S.dark/6*100)+'%'; document.getElementById('darkV').textContent=S.dark.toFixed(1);
  document.getElementById('brightF').style.width=(S.bright/6*100)+'%'; document.getElementById('brightVal').textContent=S.bright.toFixed(1);
  document.getElementById('airF').style.width=(S.air/6*100)+'%'; document.getElementById('airVal').textContent=S.air.toFixed(1);

  document.getElementById('pushVal').textContent=Math.round(S.push);

  var cgH=Math.max(0,Math.min(100,smooth.compGR/12*100));
  var lgH=Math.max(0,Math.min(100,smooth.limGR/6*100));
  document.getElementById('compGF').style.height=cgH+'%'; document.getElementById('compGV').textContent=(-smooth.compGR).toFixed(1);
  document.getElementById('limGF').style.height=lgH+'%'; document.getElementById('limGV').textContent=(-smooth.limGR).toFixed(1);

  document.getElementById('inKV').textContent=S.inputGain.toFixed(1);
  document.getElementById('limKV').textContent=S.limitGain.toFixed(1);
  document.getElementById('outKV').textContent=S.outGain.toFixed(1);

  function knobDeg(val,lo,hi){var t=(val-lo)/(hi-lo);return -135+t*270;}
  document.getElementById('inDot').style.transform='rotate('+knobDeg(S.inputGain,-12,12)+'deg)';
  document.getElementById('limDot').style.transform='rotate('+knobDeg(S.limitGain,0,12)+'deg)';
  document.getElementById('outDot').style.transform='rotate('+knobDeg(S.outGain,-24,24)+'deg)';

  document.querySelectorAll('.bp-btn').forEach(function(el){var k=el.dataset.bp;if(S.bp[k])el.classList.add('on');else el.classList.remove('on')});
  document.querySelectorAll('.os-btn').forEach(function(el){el.classList.remove('on');if(el.dataset.os===S.overMode)el.classList.add('on')});
  document.querySelectorAll('.scale-btn').forEach(function(el){el.classList.remove('on');if(Math.abs(parseFloat(el.dataset.scale)-S.zoom)<0.01)el.classList.add('on')});
}

// PUSH knob
document.getElementById('pushKnob').addEventListener('mousedown',function(e){dragTarget='push';dragStartY=e.clientY;dragVal=S.push;S._dragging=true;S._dragParam='push';e.preventDefault()});
document.getElementById('pushKnob').addEventListener('dblclick',function(){S.push=100;render()});

// EQ faders
var eqKeys=['dark','bright','air'];
['darkT','brightT','airT'].forEach(function(id,idx){
  document.getElementById(id).addEventListener('mousedown',function(e){dragTarget='eq'+idx;dragStartX=e.clientX;dragVal=S[eqKeys[idx]];S._dragging=true;S._dragParam=eqKeys[idx];e.preventDefault()});
  document.getElementById(id).addEventListener('dblclick',function(){S[eqKeys[idx]]=0;render()});
});

// Bottom knobs
var knobKeys=['inputGain','limitGain','outGain'];
[{id:'inKnobR',lo:-12,hi:12,def:0},{id:'limKnobR',lo:0,hi:12,def:3},{id:'outKnobR',lo:-24,hi:24,def:0}].forEach(function(k,idx){
  document.getElementById(k.id).addEventListener('mousedown',function(e){dragTarget='knob'+idx;dragStartY=e.clientY;dragVal=S[knobKeys[idx]];S._dragging=true;S._dragParam=knobKeys[idx];e.preventDefault()});
  document.getElementById(k.id).addEventListener('dblclick',function(){S[knobKeys[idx]]=k.def;render()});
});

// Global mouse
window.addEventListener('mousemove',function(e){
  if(!dragTarget)return;
  var sens=0.5,delta;
  if(dragTarget==='push'){delta=-(e.clientY-dragStartY)*sens; S.push=Math.max(0,Math.min(200,Math.round(dragVal+delta)))}
  else if(dragTarget[0]==='e'){var idx=parseInt(dragTarget[2]); delta=(e.clientX-dragStartX)*sens*0.1; S[eqKeys[idx]]=Math.max(0,Math.min(6,dragVal+delta))}
  else if(dragTarget[0]==='k'){var idx=parseInt(dragTarget[4]); var rng=[[-12,12],[0,12],[-24,24]]; delta=-(e.clientY-dragStartY)*sens*0.1; S[knobKeys[idx]]=Math.max(rng[idx][0],Math.min(rng[idx][1],dragVal+delta))}
  render();bridgeNotify();
});
window.addEventListener('mouseup',function(){dragTarget=null;S._dragging=false});

// Bypass
document.querySelectorAll('.bp-btn').forEach(function(el){el.addEventListener('click',function(){var k=el.dataset.bp;S.bp[k]=!S.bp[k];if(k==='all')for(var x in S.bp)S.bp[x]=S.bp.all;render();bridgeNotify()})});

// OS selector
document.querySelectorAll('.os-btn').forEach(function(el){el.addEventListener('click',function(){document.querySelectorAll('.os-btn').forEach(function(b){b.classList.remove('on')});el.classList.add('on');S.overMode=el.dataset.os;render();bridgeNotify()})});
// Scale selector
document.querySelectorAll('.scale-btn').forEach(function(el){el.addEventListener('click',function(){document.querySelectorAll('.scale-btn').forEach(function(b){b.classList.remove('on')});el.classList.add('on');S.zoom=parseFloat(el.dataset.scale);document.body.style.transform='scale('+S.zoom+')';render();bridgeNotify()})});

// Undo/Redo — counter-based: C++ poll detects count changes (reliable, no timing issues)
document.getElementById('undoBtn').addEventListener('click',function(){S._undoC++});
document.getElementById('redoBtn').addEventListener('click',function(){S._redoC++});
document.addEventListener('keydown',function(e){
  if(e.ctrlKey&&e.key==='z'&&!e.shiftKey){e.preventDefault();S._undoC++}
  if(e.ctrlKey&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();S._redoC++}
});

// Bridge to C++: try multiple patterns for JUCE 8.0.14
// Create native bridge once
window._updateParams = (typeof getNativeFunction==='function')
  ? getNativeFunction('updateParams') : null;

function bridgeNotify(){
  try{ if(window._updateParams) window._updateParams(S); }catch(e){}
}

render();
window._S=S;
window._render=render;
})();
</script>
</body>
</html>
