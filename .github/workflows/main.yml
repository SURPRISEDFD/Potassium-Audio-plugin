name: Build Windows AVX-only
on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake (MSVC /arch:AVX, disable WebView2)
        run: >
          cmake -B build
          -DCMAKE_C_FLAGS="/arch:AVX"
          -DCMAKE_CXX_FLAGS="/arch:AVX /EHsc"
          -DJUCE_WEBVIEW2_AVAILABLE=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-avx-binaries
          path: build/Release/**
