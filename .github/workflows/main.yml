name: Build Windows AVX-only
on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean previous build (avoid cache issues)
        run: if (Test-Path build) { Remove-Item -Recurse -Force build }

      - name: Configure CMake (AVX only, disable WebView2 via macro)
        run: >
          cmake -B build
          -DCMAKE_C_FLAGS="/arch:AVX"
          -DCMAKE_CXX_FLAGS="/arch:AVX /EHsc /DJUCE_WEBVIEW2_AVAILABLE=0"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-avx-binaries
          path: build/Release/**
