name: Build Windows AVX-only
on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install WebView2 SDK and set MSVC paths
        shell: pwsh
        run: |
          # 1. 下载并安装 WebView2 SDK NuGet 包
          $nugetDir = "${{ runner.temp }}\wv2"
          nuget install Microsoft.Web.WebView2 -Version 1.0.2903.40 -OutputDirectory $nugetDir
          
          # 2. 找到解压后的实际目录（带版本号的文件夹）
          $sdkDir = (Get-ChildItem -Path $nugetDir -Directory)[0].FullName
          $includePath = "$sdkDir\build\native\include"
          $libPath = "$sdkDir\build\native\lib\x64"
          
          Write-Host "WebView2 SDK include: $includePath"
          Write-Host "WebView2 SDK lib: $libPath"
          
          # 3. 将路径注入 MSVC 的环境变量（此会话内生效）
          $env:INCLUDE = "$includePath;$env:INCLUDE"
          $env:LIB = "$libPath;$env:LIB"

          # 4. 清理旧的构建目录（避免 CMake 缓存污染）
          if (Test-Path build) { Remove-Item -Recurse -Force build }

          # 5. 配置 CMake，仅开启 AVX 指令，并启用 C++ 异常
          cmake -B build `
            -DCMAKE_C_FLAGS="/arch:AVX" `
            -DCMAKE_CXX_FLAGS="/arch:AVX /EHsc"
          
          # 6. 编译 Release 版本
          cmake --build build --config Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-avx-binaries
          path: build/Release/**
